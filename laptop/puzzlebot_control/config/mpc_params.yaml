mpc_node:
  ros__parameters:
    # ── Horizon & timing ────────────────────────────────────────────────────
    N: 5                  # prediction horizon (steps)
    control_rate: 20.0    # control loop rate (Hz)
    dt: 0.05              # discretization step — must equal 1/control_rate

    # ── Vision feature target ────────────────────────────────────────────────
    area_desired: 25000.0  # target contour area in pixels² (tune for desired distance)

    # ── Interaction matrix gain ──────────────────────────────────────────────
    Kv: 0.3               # ė_area ≈ Kv·v  (increase if robot approaches too slowly)

    # ── Stage cost weights ───────────────────────────────────────────────────
    Qx: 10.0              # e_x stage penalty
    Qa:  1.0              # e_area stage penalty
    Rv:  0.2              # linear velocity regularization
    Ro:  0.2              # angular velocity regularization

    # ── Terminal cost weights (enforce convergence) ──────────────────────────
    Px: 50.0              # e_x terminal penalty
    Pa:  5.0              # e_area terminal penalty

    # ── Actuation limits ─────────────────────────────────────────────────────
    v_max:     0.06       # maximum linear velocity  [m/s]
    omega_max: 0.20       # maximum angular velocity [rad/s]

    # ── Command smoothing ───────────────────────────────────────────────────
    max_v_step:     0.015 # max linear velocity change per control tick [m/s]
    max_omega_step: 0.05  # max angular velocity change per control tick [rad/s]

    # ── Grid resolution ──────────────────────────────────────────────────────
    v_candidates:     7   # number of v samples in [0, v_max]
    omega_candidates: 11  # number of ω samples in [−ω_max, ω_max]

    # ── Safety ───────────────────────────────────────────────────────────────
    detection_timeout: 0.5  # stop robot if no detection for this many seconds
    # CRITICAL: angular_sign should be 1.0 if MPC omega matches ROS convention.
    # The MPC generates omega where positive = turn left (ROS REP-103).
    # If robot turns OPPOSITE to target direction, flip this to -1.0.
    # Current setting: 1.0 (MPC sign is correct, no inversion needed)
    angular_sign: 1.0       # flip between 1.0/-1.0 if steering is reversed

    # ── High-level FSM ──────────────────────────────────────────────────────
    enable_controller: true

    # SEARCH: rotate slowly when the target is not visible.
    enable_search: true
    search_omega: 0.08
    search_direction: 1.0
    enable_acquire_state: true
    acquire_hold_sec: 0.30
    acquire_timeout_sec: 0.80
    target_lost_grace_sec: 0.40
    use_last_target_search_direction: false

    # GOAL_REACHED: stop near the target using contour area as distance proxy.
    enable_goal_stop: true
    target_area_stop: 25000.0
    target_area_resume: 18000.0

    # AVOID: simple frontal obstacle avoidance using /LaserDistance.
    enable_obstacle_avoidance: true
    obstacle_topic: "/LaserDistance"
    vision_obstacle_topic: "/vision_obstacle_debug"
    obstacle_distance_scale: 1.0
    obstacle_stop_distance: 0.12
    obstacle_avoid_distance: 0.30
    obstacle_clear_distance: 0.40
    obstacle_timeout_sec: 1.0
    avoid_omega: 0.14
    avoid_direction: 1.0
    avoid_forward_speed: 0.02
    avoid_reverse_speed: 0.0

    # Visual AVOID: camera obstacle debug can also trigger AVOID.
    enable_visual_obstacle_avoidance: true
    visual_obstacle_close_required: true
    visual_obstacle_timeout_sec: 0.5
    visual_obstacle_clear_grace_sec: 0.30
    visual_obstacle_min_area: 2500.0
    visual_obstacle_center_deadband: 0.10
    visual_avoid_omega: 0.14
    visual_avoid_forward_speed: 0.0
    visual_avoid_default_direction: 1.0
    use_post_avoid_search_direction: true
    post_avoid_search_memory_sec: 2.0
    # Visual obstacle context-aware avoidance: only avoid if obstacle blocks target
    visual_obstacle_avoid_requires_target_context: true
    ignore_visual_obstacle_during_search_without_target: true
    visual_obstacle_blocks_target_ex_threshold: 0.30
    visual_obstacle_allow_avoid_in_search_if_laser_close: true

    # Camera readiness gate: never search/track/avoid until vision is fresh.
    require_camera_ready: true
    camera_ready_timeout_sec: 1.0
    camera_startup_grace_sec: 0.5
    camera_lost_stop: true
    camera_ready_min_messages: 3
    camera_ready_require_fresh_obstacle_debug: false
    camera_ready_obstacle_timeout_sec: 1.0

    # Debug topics/logs.
    publish_debug: true
    debug_log_period_sec: 1.0

    # CSV black-box log.
    enable_csv_log: true
    csv_log_dir: "/tmp/puzzlebot_logs"
    csv_log_prefix: "mpc_fsm_log"
    csv_flush_every: 1

    # Safe shutdown stop burst.
    safety_zero_burst_count: 10
    safety_zero_burst_dt: 0.05

    # Emergency stop and hard safety limits.
    emergency_stop_topic: "/emergency_stop"
    enable_cmd_safety_clamp: true
    hard_v_limit: 0.08      # absolute maximum linear velocity [m/s]
    hard_omega_limit: 0.25  # absolute maximum angular velocity [rad/s]
    enable_steering_sign_check: true  # warn if steering appears reversed

    # Target behind obstacle maneuver: intelligent bypass when target is blocked.
    # This activates when the red circular target appears to be behind/blocked by
    # the red_box obstacle. The robot will:
    # 1. Confirm (stay still briefly to verify)
    # 2. Turn away from obstacle
    # 3. Move forward to bypass
    # 4. Turn back toward expected target location
    # 5. Search/reacquire target
    enable_target_behind_obstacle_maneuver: true
    target_obstacle_confirm_sec: 0.4           # confirmation hold time
    target_obstacle_min_confirm_frames: 5      # min frames to confirm (not used yet)
    target_memory_sec: 2.0                     # how long to remember last target
    target_obstacle_ex_alignment_threshold: 0.35  # max ex difference to consider aligned
    target_obstacle_requires_close: true       # obstacle must be "close" to trigger
    target_behind_obstacle_cooldown_sec: 1.0   # cooldown between maneuvers
    target_behind_obstacle_max_retries: 3      # max retry attempts
    target_behind_avoid_turn_omega: 0.24       # turn rate during initial turn (VERY aggressive, ~27.5°)
    target_behind_avoid_turn_sec: 3.64         # duration of initial turn (much longer, wide clearance)
    target_behind_forward_speed: 0.08          # forward speed during bypass (max safe speed, ~20.8cm)
    target_behind_forward_omega: 0.04          # curve during forward (noticeable arc, ~6°)
    target_behind_forward_sec: 6.25            # duration of forward motion (very long to fully clear)
    target_behind_turn_back_omega: 0.22        # turn rate when turning back (very aggressive, ~20.2°)
    target_behind_turn_back_sec: 2.80          # duration of turn back (much longer)
    target_behind_reacquire_omega: 0.14        # search rate during reacquire (faster, ~32° max)
    target_behind_reacquire_timeout_sec: 6.0   # max time to search for target (extended search)
    reacquire_obstacle_confirm_sec: 0.50       # obstacle must remain stable during reacquire
    reacquire_obstacle_confirm_frames: 5       # or be seen this many reacquire cycles
    reacquire_obstacle_center_ex_limit: 0.55   # only central/frontal obstacles can restart avoid
    reacquire_obstacle_ignore_edge_ex: 0.70    # ignore edge false positives during reacquire
    reacquire_obstacle_min_area_ratio: 0.75    # reject much smaller reacquire obstacles
    reacquire_obstacle_requires_close: true    # only close obstacles can trigger retry
    reacquire_obstacle_retry_cooldown_sec: 1.5 # avoid retry loops
    ignore_edge_obstacles_during_reacquire: true

visualizer_node:
  ros__parameters:
    area_desired: 25000.0  # keep in sync with mpc_node
